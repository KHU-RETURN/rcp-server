openapi: 3.0.3
info:
  title: RCP Server API
  version: 0.1.0
  description: |
    Local development reference for the RCP server.
    This document is intended for developers who want to quickly inspect
    request and response shapes while working on the API.
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: access
    description: Key pair management
  - name: compute
    description: Compute resource management
paths:
  /api/v1/access/keypairs:
    post:
      tags: [access]
      summary: Create an OpenStack key pair
      description: Creates a key pair after validating the request body and SSH public key format.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKeyPairRequest'
            example:
              name: team-default-key
              public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMz7v3R7iK4WbG2ZrM8Z8vV7n6lYx4l6Wwq8m7M+v7gL test@example
      responses:
        '201':
          description: Key pair created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyPairResponse'
        '400':
          description: Invalid request body or invalid SSH public key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    error: Invalid request body
                invalidKey:
                  value:
                    error: invalid SSH public key format
        '403':
          description: Upstream access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: keypair access denied
        '409':
          description: Duplicate key pair name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: name already exists
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: failed to create keypair
  /api/v1/compute/flavors:
    get:
      tags: [compute]
      summary: List compute flavors
      description: Returns the currently available flavor catalog.
      responses:
        '200':
          description: Flavor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FlavorResponse'
        '500':
          description: Flavor lookup failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 사양 조회를 실패했습니다: upstream error
  /api/v1/compute/flavors/all:
    get:
      tags: [compute]
      summary: List all compute flavors
      description: Alias of `/api/v1/compute/flavors`.
      responses:
        '200':
          description: Flavor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FlavorResponse'
        '500':
          description: Flavor lookup failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 사양 조회를 실패했습니다: upstream error
  /api/v1/compute/flavors/available:
    get:
      tags: [compute]
      summary: List flavors with remaining capacity
      description: Calculates how many instances can still be created for each flavor based on quota.
      responses:
        '200':
          description: Available flavors with max configurable count
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailableFlavorResponse'
        '500':
          description: Cloud connection or quota lookup failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                cloud:
                  value:
                    error: Cloud connection failed
                quota:
                  value:
                    error: 쿼터 조회 실패: upstream error
  /api/v1/compute/instances:
    post:
      tags: [compute]
      summary: Create a compute instance
      description: |
        Creates a new OpenStack server instance.
        The current implementation returns the JSON-serialized gophercloud
        `servers.Server` object almost as-is.
        Note that the upstream `image` field is not exposed in this response,
        because the SDK type does not marshal it back out as JSON.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServerRequest'
            example:
              name: team-vm-01
              image_id: image-uuid
              flavor_id: flavor-uuid
              network_id: network-uuid
      responses:
        '201':
          description: Instance creation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenStackServerResponse'
              example:
                id: server-uuid
                tenant_id: tenant-uuid
                user_id: user-uuid
                name: team-vm-01
                created: "2026-03-23T01:00:00Z"
                updated: "2026-03-23T01:02:03Z"
                hostid: host-id
                status: BUILD
                progress: 12
                accessIPv4: "203.0.113.10"
                accessIPv6: "2001:db8::1"
                flavor:
                  id: flavor-uuid
                addresses:
                  private:
                    - addr: 10.0.0.8
                      version: 4
                metadata:
                  env: dev
                links:
                  - href: https://example.com/server-uuid
                    rel: self
                key_name: team-default-key
                security_groups:
                  - name: default
                os-extended-volumes:volumes_attached:
                  - id: vol-1
                fault:
                  code: 500
                  created: "2026-03-23T01:03:00Z"
                  details: detail
                  message: err
                tags:
                  - web
                server_groups:
                  - group-1
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid request body
        '500':
          description: Cloud connection or upstream instance creation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                connection:
                  value:
                    error: Failed to connect to cloud
                upstream:
                  value:
                    error: upstream create server error
components:
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    CreateKeyPairRequest:
      type: object
      required: [name, public_key]
      properties:
        name:
          type: string
          description: OpenStack key pair name
        public_key:
          type: string
          description: SSH public key in authorized_keys format
    KeyPairResponse:
      type: object
      required: [name, fingerprint, public_key]
      properties:
        name:
          type: string
        fingerprint:
          type: string
        public_key:
          type: string
    FlavorResponse:
      type: object
      required: [id, name, vcpus, ram, disk]
      properties:
        id:
          type: string
        name:
          type: string
        vcpus:
          type: integer
        ram:
          type: integer
          description: Memory in MB
        disk:
          type: integer
          description: Disk size in GB
    AvailableFlavorResponse:
      allOf:
        - $ref: '#/components/schemas/FlavorResponse'
        - type: object
          required: [max_configurable]
          properties:
            max_configurable:
              type: integer
    CreateServerRequest:
      type: object
      required: [name, image_id, flavor_id]
      properties:
        name:
          type: string
        image_id:
          type: string
        flavor_id:
          type: string
        network_id:
          type: string
          description: Optional OpenStack network UUID
    OpenStackServerResponse:
      type: object
      description: Representative subset of the JSON output from gophercloud `servers.Server`.
      additionalProperties: true
      properties:
        id:
          type: string
        tenant_id:
          type: string
        user_id:
          type: string
        name:
          type: string
        updated:
          type: string
          format: date-time
        created:
          type: string
          format: date-time
        hostid:
          type: string
        status:
          type: string
        progress:
          type: integer
        accessIPv4:
          type: string
        accessIPv6:
          type: string
        flavor:
          type: object
          additionalProperties: true
        addresses:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties:
            type: string
        links:
          type: array
          items:
            type: object
            additionalProperties: true
        key_name:
          type: string
        adminPass:
          type: string
        security_groups:
          type: array
          items:
            type: object
            additionalProperties: true
        os-extended-volumes:volumes_attached:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
        fault:
          type: object
          properties:
            code:
              type: integer
            created:
              type: string
              format: date-time
            details:
              type: string
            message:
              type: string
        tags:
          type: array
          items:
            type: string
        server_groups:
          type: array
          items:
            type: string
